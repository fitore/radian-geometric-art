<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radian — Where Art and Mathematics Unite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/index.css">
</head>
<body>

<!-- Background hex grid -->
<svg class="bg-geometry" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <pattern id="hexgrid" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 17 L60 35 L30 52 L0 35 L0 17 Z" fill="none" stroke="var(--color-gold)" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#hexgrid)"/>
</svg>

<!-- Compass rose decoration -->
<svg class="compass-deco" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <circle cx="200" cy="200" r="190" fill="none" stroke="var(--color-gold)" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="var(--color-gold)" stroke-width="0.3"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="var(--color-gold)" stroke-width="0.3"/>
  <circle cx="200" cy="200" r="50"  fill="none" stroke="var(--color-gold)" stroke-width="0.5"/>
  <line x1="200" y1="10"  x2="200" y2="390" stroke="var(--color-gold)" stroke-width="0.3"/>
  <line x1="10"  y1="200" x2="390" y2="200" stroke="var(--color-gold)" stroke-width="0.3"/>
  <line x1="65"  y1="65"  x2="335" y2="335" stroke="var(--color-gold)" stroke-width="0.3"/>
  <line x1="335" y1="65"  x2="65"  y2="335" stroke="var(--color-gold)" stroke-width="0.3"/>
  <polygon points="200,10 208,45 200,35 192,45"    fill="var(--color-gold)"/>
  <polygon points="200,390 208,355 200,365 192,355" fill="var(--color-gold)" opacity="0.5"/>
  <polygon points="10,200 45,192 35,200 45,208"    fill="var(--color-gold)" opacity="0.5"/>
  <polygon points="390,200 355,192 365,200 355,208" fill="var(--color-gold)" opacity="0.5"/>
</svg>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="wordmark">
      <div class="wordmark-title">RADIAN</div>
      <div class="wordmark-sep"></div>
      <div class="wordmark-sub">Where Art and Mathematics Unite</div>
    </div>
    <div class="header-actions">
      <button class="btn btn--theme" id="themeToggle" title="Toggle light/dark mode">
        <span class="theme-icon" aria-hidden="true">☀</span>
        <span class="theme-label">Dark</span>
      </button>
      <button class="btn" id="importBtn">Import JSON</button>
      <button class="btn" id="exportBtn">Export JSON</button>
      <button class="btn" id="settingsBtn">Settings</button>
      <button class="btn btn--primary" id="addBtn">+ Add piece</button>
    </div>
  </header>

  <!-- Sidebar — populated by renderSidebar() -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main gallery -->
  <main class="main" id="mainArea">
    <div class="gallery-header">
      <div class="gallery-header-left">
        <div class="gallery-title" id="galleryTitle">Your collection</div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--color-want)"></div>Want to try
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--color-tried)"></div>Attempted
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--color-done)"></div>Done
          </div>
        </div>
      </div>
      <div class="gallery-header-right">
        <input type="search" class="search-input" id="searchInput" placeholder="Search…" autocomplete="off">
        <select class="sort-select" id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="az">Title A–Z</option>
        </select>
      </div>
    </div>
    <div class="gallery-grid" id="gallery"></div>
  </main>

</div>

<!-- Backdrops -->
<div class="panel-backdrop" id="formBackdrop"></div>
<div class="panel-backdrop" id="settingsBackdrop"></div>

<!-- Add / Edit panel -->
<div class="form-panel" id="formPanel" role="dialog" aria-label="Add or edit piece">
  <div class="form-panel-header">
    <div class="form-panel-title" id="formTitle">NEW PIECE</div>
    <button class="icon-btn" id="formClose" title="Close" aria-label="Close panel">✕</button>
  </div>
  <div class="form-panel-body" id="formBody">
    <!-- Populated by renderForm() -->
  </div>
  <div class="form-panel-footer">
    <button class="btn btn--cancel" id="btnCancel">Cancel</button>
    <button class="btn btn--save" id="btnSave">Save piece</button>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settingsPanel" role="dialog" aria-label="Settings">
  <div class="form-panel-header">
    <div class="form-panel-title">SETTINGS</div>
    <button class="icon-btn" id="settingsClose" title="Close" aria-label="Close settings">✕</button>
  </div>
  <div class="settings-body" id="settingsBody">
    <!-- Populated by renderSettings() -->
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="imageFileInput" accept="image/*" style="display:none">
<input type="file" id="importFileInput" accept=".json" style="display:none">

<script type="module" src="/src/app.ts"></script>
</body>
</html>
